<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ app_name }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', path='styles.css') }}">
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="20" x2="12" y2="10"></line><line x1="18" y1="20" x2="18" y2="4"></line><line x1="6" y1="20" x2="6" y2="16"></line></svg>
      <h1>{{ app_name }}</h1>
      <span class="badge">Terminal</span>
    </div>
    <div class="header-meta">
      <span>System Timezone</span>
      {{ timezone }}
    </div>
  </header>

  <div class="toolbar">
    <div class="toolbar-left">
      <div class="controls">
        <button id="run-button">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
          Execute Pipeline
        </button>
        <button id="refresh-button" class="secondary">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"></path><path d="M16 16h5v5"></path></svg>
          Sync Feed
        </button>
        <button id="digest-button" class="secondary">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
          Reload Report
        </button>
      </div>
      <div class="window-tabs" id="window-tabs">
        <button class="tab-button active" data-window="24h">24h</button>
        <button class="tab-button" data-window="3d">3d</button>
        <button class="tab-button" data-window="7d">7d</button>
        <button class="tab-button" data-window="30d">30d</button>
      </div>
    </div>
    <div class="status-pill">
      <div class="status-dot"></div>
      <span id="status">System ready</span>
    </div>
  </div>

  <main class="workspace">
    <section class="panel">
      <div class="panel-header">
        <div>
          <div class="meta-title">Ingest Stream</div>
          <h2>Raw Intelligence</h2>
        </div>
        <div class="badge panel-badge" id="article-count">0 records</div>
      </div>
      <div class="panel-content" id="article-list"></div>
    </section>

    <section class="panel">
      <div class="panel-header">
        <div>
          <div class="meta-title">Synthesis</div>
          <h2>Analyst Report</h2>
        </div>
      </div>
      <div class="panel-content">
        <div class="digest-container" id="digest-content">
          <div class="empty-state">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--border-hover)" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" class="empty-icon"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
            <p>No digest generated yet.</p>
            <p class="empty-subtext">Execute the pipeline to build the report.</p>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="{{ url_for('static', path='app.js') }}"></script>
</body>
</html>
